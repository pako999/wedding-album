<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="'DM Sans','Segoe UI',system-ui,sans-serif">
  <rect width="1200" height="640" rx="24" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1199" height="639" rx="23.5" fill="none" stroke="#E5E7EB"/>

  <!-- Title -->
  <text x="64" y="76" font-size="30" font-weight="800" fill="#0F1729">Svaka prepreka smanji broj podeljenih fotografija za ~30&#160;%</text>
  <text x="64" y="110" font-size="17" fill="#64748B">Šta se dogodi sa 200 fotografija snimljenih na venčanju — tradicionalni tok (WhatsApp / e-mail)</text>

  <!-- Bars: max 200 → plot width 880, left label column at x=64, bars from x=64 -->
  <!-- Bar 1: 200 -->
  <text x="64" y="176" font-size="15" font-weight="700" fill="#0F1729">Snimljeno na telefonima gostiju</text>
  <rect x="64" y="188" width="880" height="40" rx="4" fill="#2563EB"/>
  <text x="960" y="215" font-size="17" font-weight="800" fill="#0F1729">200</text>

  <!-- Bar 2: 140 -->
  <text x="64" y="272" font-size="15" font-weight="700" fill="#0F1729">1. prepreka — otvori aplikaciju i pronađi grupu</text>
  <rect x="64" y="284" width="616" height="40" rx="4" fill="#2563EB"/>
  <text x="696" y="311" font-size="17" font-weight="800" fill="#0F1729">140</text>
  <text x="770" y="311" font-size="14" fill="#94A3B8">−30&#160;%</text>

  <!-- Bar 3: 98 -->
  <text x="64" y="368" font-size="15" font-weight="700" fill="#0F1729">2. prepreka — izaberi 30 fotografija jednu po jednu</text>
  <rect x="64" y="380" width="431" height="40" rx="4" fill="#2563EB"/>
  <text x="511" y="407" font-size="17" font-weight="800" fill="#0F1729">98</text>
  <text x="575" y="407" font-size="14" fill="#94A3B8">−51&#160;%</text>

  <!-- Bar 4: 69 -->
  <text x="64" y="464" font-size="15" font-weight="700" fill="#0F1729">3. prepreka — pošalji i sačekaj (veliki video zapisi…)</text>
  <rect x="64" y="476" width="304" height="40" rx="4" fill="#2563EB"/>
  <text x="384" y="503" font-size="17" font-weight="800" fill="#0F1729">69</text>
  <text x="448" y="503" font-size="14" fill="#94A3B8">−66&#160;%</text>

  <!-- Bottom annotation -->
  <rect x="64" y="552" width="1072" height="2" fill="#F1F5F9"/>
  <text x="64" y="594" font-size="16" fill="#64748B">U praksi se doda i četvrta prepreka — zaboravnost. Par na kraju dobije <tspan font-weight="800" fill="#0F1729">~30 fotografija od 200 snimljenih.</tspan></text>
</svg>
